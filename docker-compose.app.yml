# Fox — self-host the web app (the "common" image: every dialect except Db2).
# Separate from the root docker-compose.yml, which spins up the 6 test databases.
#
#   cp .env.example .env      # then set APP_ENCRYPTION_KEY
#   docker compose -f docker-compose.app.yml up -d --build
#
# To include IBM Db2 (adds ~1GB, requires linux/amd64), overlay the Db2 override:
#   docker compose -f docker-compose.app.yml -f docker-compose.db2.yml up -d --build
#
# Open http://localhost:${PORT}  (default 3001). See docs/DEPLOYMENT.md.

services:
  fox:
    build:
      context: .
      dockerfile: Dockerfile
    image: fox:latest
    # Publish host ${PORT} -> the container's ${API_PORT}. Set PORT in .env to
    # avoid clashing with your other services.
    ports:
      - '${PORT:-3001}:${API_PORT:-3001}'
    environment:
      API_PORT: ${API_PORT:-3001}
      # Required — compose refuses to start if unset. Generate: openssl rand -hex 32
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?Set APP_ENCRYPTION_KEY in .env (generate with: openssl rand -hex 32)}
      APP_DB_ENGINE: ${APP_DB_ENGINE:-sqlite}
      APP_DB_PATH: ${APP_DB_PATH:-/data/foxschema.db}
      APP_DB_URL: ${APP_DB_URL:-}
      APP_KEY_SCHEME: ${APP_KEY_SCHEME:-v1}
      LOCAL_SINGLE_USER: ${LOCAL_SINGLE_USER:-true}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
      NODE_ENV: production
    volumes:
      - fox_data:/data
    restart: unless-stopped

volumes:
  fox_data:
