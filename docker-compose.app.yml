# Fox Schema — self-host the web app (single image, all dialects including Db2).
# Separate from the root docker-compose.yml, which spins up the test databases.
#
# Pull-and-run (no .env needed — entrypoint auto-creates APP_ENCRYPTION_KEY on /data):
#   docker compose -f docker-compose.app.yml up -d
#
# Or build locally (linux/amd64 — ibm_db has no arm64 build):
#   docker compose -f docker-compose.app.yml up -d --build
#
# Optional: set APP_ENCRYPTION_KEY in .env to pin the key yourself.
# Open http://localhost:${PORT}  (default 3001). See docs/DEPLOYMENT.md.

services:
  fox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WITH_DB2: 'true'
    platform: linux/amd64
    # Prefer the published Hub image; `up --build` still builds locally.
    image: ${FOX_IMAGE:-5nickels/foxschema:latest}
    # Publish host ${PORT} -> the container's ${API_PORT}. Set PORT in .env to
    # avoid clashing with your other services.
    ports:
      - '${PORT:-3001}:${API_PORT:-3001}'
    environment:
      API_PORT: ${API_PORT:-3001}
      # Optional — when unset, docker-entrypoint.sh generates and persists a key
      # at /data/.app_encryption_key on first boot.
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      APP_DB_ENGINE: ${APP_DB_ENGINE:-sqlite}
      APP_DB_PATH: ${APP_DB_PATH:-/data/foxschema.db}
      APP_DB_URL: ${APP_DB_URL:-}
      APP_KEY_SCHEME: ${APP_KEY_SCHEME:-v1}
      LOCAL_SINGLE_USER: ${LOCAL_SINGLE_USER:-true}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
      NODE_ENV: production
    volumes:
      - fox_data:/data
    restart: unless-stopped

volumes:
  fox_data:
