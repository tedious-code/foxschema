# Db2 override — overlay ON TOP of docker-compose.app.yml to build the variant
# that includes the IBM Db2 driver. It adds ~1GB and must target linux/amd64
# (ibm_db has no linux/arm64 build; on an Apple-Silicon host it builds under
# emulation). See docs/DEPLOYMENT.md.
#
#   docker compose -f docker-compose.app.yml -f docker-compose.db2.yml up -d --build

services:
  fox:
    build:
      args:
        WITH_DB2: 'true'
    platform: linux/amd64
    image: fox:db2
