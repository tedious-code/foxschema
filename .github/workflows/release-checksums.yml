name: Release Checksums

# Optional SHA256SUMS.txt upload when a GitHub Release is published.
# Desktop installer releases are retired; this remains useful if a tag release
# attaches other assets (e.g. future CLI portable zips).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to checksum (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  checksums:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve the release tag
        id: tag
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        id: assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "${{ steps.tag.outputs.tag }}" --repo "${{ github.repository }}" --dir assets --clobber || true
          count=$(find assets -type f ! -name 'SHA256SUMS.txt' 2>/dev/null | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count release asset(s)"

      - name: Generate SHA256SUMS.txt
        if: steps.assets.outputs.count != '0'
        run: |
          cd assets
          find . -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload SHA256SUMS.txt
        if: steps.assets.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" assets/SHA256SUMS.txt \
            --repo "${{ github.repository }}" --clobber
