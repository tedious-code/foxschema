name: Publish to WinGet

# RETIRED for desktop MSI packages (TediousCode.FoxSchema / .DB2).
# Desktop Tauri installers are no longer published.
#
# Windows install path: npm i -g foxschema  (Node ≥ 22.5)
# A future winget package may wrap the npm CLI; until then this workflow is a no-op.

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Desktop MSI winget publishes are retired — use npm on Windows'
        required: false
        default: 'retired'

jobs:
  retired:
    runs-on: ubuntu-latest
    steps:
      - name: Winget MSI channel retired
        run: |
          echo "::notice::Desktop MSI winget packages are retired (no new versions)."
          echo "Windows: npm install -g foxschema && foxschema"
          echo "Also: Homebrew (macOS), Docker 5nickels/foxschema:latest"
          exit 0
