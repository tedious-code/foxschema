name: Publish to WinGet

# One package: TediousCode.FoxSchema (CLI portable zip; depends on OpenJS.NodeJS.LTS).
# Builds the zip from the published npm package (no monorepo build required).
#
# Secrets:
#   WINGET_TOKEN — classic PAT (public_repo) for fork user huyplb

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag / version tag (e.g. v0.1.67)'
        required: true
        default: 'v0.1.67'
      submit:
        description: 'Open/update PR on microsoft/winget-pkgs'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-portable:
    if: startsWith(github.event.release.tag_name || inputs.tag, 'v')
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      sha256: ${{ steps.meta.outputs.sha256 }}
      zip_name: ${{ steps.meta.outputs.zip_name }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Pack Windows portable zip from npm
        id: pack
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name || inputs.tag }}"
          $ver = $tag.TrimStart('v')
          ./packaging/winget/build-portable.ps1 -Version $ver

      - name: Read build metadata
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name || inputs.tag }}"
          $ver = $tag.TrimStart('v')
          $zip = "dist/winget/foxschema-$ver-win-x64.zip"
          $sha = (Get-FileHash -Algorithm SHA256 $zip).Hash
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$ver" >> $env:GITHUB_OUTPUT
          "sha256=$sha" >> $env:GITHUB_OUTPUT
          "zip_name=$(Split-Path $zip -Leaf)" >> $env:GITHUB_OUTPUT
          Get-Item $zip | Format-List

      - uses: actions/upload-artifact@v4
        with:
          name: foxschema-winget-zip
          path: dist/winget/foxschema-*-win-x64.zip

      - name: Ensure GitHub Release + upload zip
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          ZIP="dist/winget/${{ steps.meta.outputs.zip_name }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "Fox Schema ${TAG#v}" \
              --notes "CLI release ${TAG}. Windows portable zip for winget; npm: foxschema@${TAG#v}."
          fi
          gh release upload "$TAG" "$ZIP" --clobber

  submit-winget:
    needs: build-portable
    if: (github.event_name == 'release' || inputs.submit) && needs.build-portable.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Prepare manifests with release URL + SHA256
        env:
          SHA: ${{ needs.build-portable.outputs.sha256 }}
          VER: ${{ needs.build-portable.outputs.version }}
          TAG: ${{ needs.build-portable.outputs.tag }}
          ZIP: ${{ needs.build-portable.outputs.zip_name }}
        run: |
          DIR="packaging/winget/TediousCode.FoxSchema/${VER}"
          if [ ! -d "$DIR" ]; then
            echo "::error::Missing manifests at $DIR — add packaging/winget/TediousCode.FoxSchema/${VER}/"
            exit 1
          fi
          INST="${DIR}/TediousCode.FoxSchema.installer.yaml"
          URL="https://github.com/tedious-code/foxschema/releases/download/${TAG}/${ZIP}"
          perl -i -pe "s|InstallerUrl: .*|InstallerUrl: ${URL}|" "$INST"
          perl -i -pe "s|InstallerSha256: .*|InstallerSha256: ${SHA}|" "$INST"
          mkdir -p /tmp/winget-manifests
          cp -R "$DIR" /tmp/winget-manifests/
          cat "$INST"

      - name: Open PR on winget-pkgs (single package)
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
          VER: ${{ needs.build-portable.outputs.version }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Missing WINGET_TOKEN — add a classic PAT (public_repo) for huyplb"
            exit 1
          fi

          FORK_USER=huyplb
          BRANCH="TediousCode.FoxSchema-${VER}"
          DEST="manifests/t/TediousCode/FoxSchema/${VER}"

          rm -rf /tmp/winget-pkgs
          gh repo clone "${FORK_USER}/winget-pkgs" /tmp/winget-pkgs -- --depth 1
          cd /tmp/winget-pkgs
          git config user.name "foxschema-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/microsoft/winget-pkgs.git || true
          git fetch upstream master --depth 1
          git checkout -B "$BRANCH" upstream/master

          rm -rf manifests/t/TediousCode/FoxSchema.DB2

          mkdir -p "$DEST"
          cp /tmp/winget-manifests/"${VER}"/* "$DEST/"

          git add manifests/t/TediousCode/FoxSchema
          git add -u manifests/t/TediousCode/FoxSchema.DB2 || true
          git status
          git commit -m "New package: TediousCode.FoxSchema version ${VER}"
          git push -u "https://x-access-token:${GH_TOKEN}@github.com/${FORK_USER}/winget-pkgs.git" "HEAD:refs/heads/${BRANCH}" --force

          gh pr close 403112 --repo microsoft/winget-pkgs --comment "Superseded: single product TediousCode.FoxSchema (CLI). DB2 is optional via npm ibm_db." || true
          gh pr close 403101 --repo microsoft/winget-pkgs --comment "Superseded by TediousCode.FoxSchema ${VER} (CLI portable zip + Node.js dependency)." || true

          EXISTING=$(gh pr list --repo microsoft/winget-pkgs --head "${FORK_USER}:${BRANCH}" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "PR already open: #$EXISTING"
            gh pr view "$EXISTING" --repo microsoft/winget-pkgs --json url -q .url
          else
            BODY_FILE=$(mktemp)
            cat > "$BODY_FILE" <<EOF
          One Fox Schema package for Windows (CLI).

          - PackageIdentifier: TediousCode.FoxSchema
          - Version: ${VER}
          - Installer: portable zip (foxschema.cmd / fox.cmd) from GitHub Releases
          - Dependency: OpenJS.NodeJS.LTS (>= 22.5.0)
          - Notes: Desktop MSI / FoxSchema.DB2 packages are retired. Db2 is optional via npm ibm_db.

          Install after merge: winget install TediousCode.FoxSchema
          EOF
            sed -i 's/^          //' "$BODY_FILE"
            gh pr create --repo microsoft/winget-pkgs \
              --head "${FORK_USER}:${BRANCH}" \
              --base master \
              --title "New package: TediousCode.FoxSchema version ${VER}" \
              --body-file "$BODY_FILE"
          fi
