name: Desktop Release

# RETIRED — desktop (Tauri) installers are no longer published.
# Distribution is CLI-first: npm, Homebrew, Winget (CLI), and Docker.
# See README.md and docs/DEPLOYMENT.md.
#
# This workflow is kept only so old workflow links do not 404. It does not
# build or upload anything.

on:
  workflow_dispatch:

jobs:
  retired:
    runs-on: ubuntu-latest
    steps:
      - name: Desktop releases are retired
        run: |
          echo "::notice::Desktop (Tauri) releases are retired."
          echo "Install via: npm i -g foxschema | brew tap tedious-code/foxschema https://github.com/tedious-code/foxschema && brew trust tedious-code/foxschema && brew install foxschema"
          echo "Or Docker: docker pull 5nickels/foxschema:latest"
          exit 0
