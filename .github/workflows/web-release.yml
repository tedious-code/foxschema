name: Web Release

# Builds the single Fox Schema Docker image (UI + API, all dialects including
# Db2) and pushes it to:
#   - GitHub Container Registry (always): ghcr.io/tedious-code/foxschema
#   - Docker Hub (when DOCKERHUB_* secrets are set): <user>/foxschema
#
# One image only — no separate "common" vs "db2" tags. ibm_db has no
# linux/arm64 build, so the image is linux/amd64. Apple Silicon hosts can pull
# via emulation, or use the npm/Homebrew CLI instead.
#
# Trigger: push a version tag (e.g. `v0.1.0`), or run manually from Actions.
#
# Docker Hub secrets (repo Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME — Hub user/org that owns the foxschema repository
#   DOCKERHUB_TOKEN    — Hub access token (Read & Write), not the account password

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push images to ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # tedious-code/foxschema

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Determine image tag
        id: ver
        run: echo "tag=${{ github.ref_type == 'tag' && github.ref_name || format('dev-{0}', github.run_number) }}" >> "$GITHUB_OUTPUT"

      - name: Compose image tags
        id: tags
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          GHCR="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          GHCR="${GHCR,,}" # lowercase (GHCR requirement)
          {
            echo "tags<<EOF"
            echo "${GHCR}:latest"
            echo "${GHCR}:${TAG}"
            if [ -n "${DOCKERHUB_USERNAME}" ]; then
              echo "${DOCKERHUB_USERNAME}/foxschema:latest"
              echo "${DOCKERHUB_USERNAME}/foxschema:${TAG}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            echo "push_dockerhub=true" >> "$GITHUB_OUTPUT"
          else
            echo "push_dockerhub=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.tags.outputs.push_dockerhub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image (linux/amd64, includes Db2)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            WITH_DB2=true
          tags: ${{ steps.tags.outputs.tags }}
