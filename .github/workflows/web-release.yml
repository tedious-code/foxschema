name: Web Release

# Builds the web app's Docker image (see Dockerfile) and pushes it to GitHub
# Container Registry: the common image (every dialect except Db2, any
# architecture) plus the opt-in Db2 variant (amd64 only). See
# docs/DEPLOYMENT.md for what the two variants are and how to run them.
#
# Trigger: push a version tag (e.g. `v0.1.0`), or run manually from the
# Actions tab. Mirrors desktop-release.yml's trigger so one tag cuts both
# releases together.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push images to ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # tedious-code/foxschema, lowercase already

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: ver
        run: echo "tag=${{ github.ref_type == 'tag' && github.ref_name || format('dev-{0}', github.run_number) }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Common image is native on amd64/arm64 (see Dockerfile); building arm64
      # here still needs emulation since GitHub-hosted runners are amd64 only.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push common image (multi-arch, no Db2)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            WITH_DB2=false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.tag }}

      - name: Build & push Db2 image (amd64 only)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            WITH_DB2=true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:db2-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:db2-${{ steps.ver.outputs.tag }}
